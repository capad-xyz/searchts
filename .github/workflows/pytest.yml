name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[dev]"

      - name: Run tests
        run: |
          pytest -q

  # Editable installs (-e) never exercise wheel packaging, so a broken wheel
  # can pass tests and still fail every real `pip install` from source.
  # This job builds the actual wheel and installs it into a clean venv.
  wheel-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify wheel has no duplicate entries and ships data files
        run: |
          python - <<'PY'
          import glob, zipfile, collections
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          dupes = [n for n, c in collections.Counter(names).items() if c > 1]
          assert not dupes, f"duplicate entries in wheel: {dupes}"
          assert "searchts/skill/SKILL.md" in names, "SKILL.md missing from wheel"
          for prefix in ("searchts/guides/", "searchts/skill/references/"):
              assert any(n.startswith(prefix) for n in names), f"{prefix} missing from wheel"
          print(f"wheel OK: {len(names)} entries, no duplicates, data files present")
          PY

      - name: Smoke-install wheel into clean venv
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/*.whl
          /tmp/smoke/bin/searchts version
          cd /tmp && /tmp/smoke/bin/python -c "import searchts; from importlib.resources import files; assert (files('searchts')/'skill'/'SKILL.md').is_file(); print('SKILL.md ships in site-packages OK')"

  # The release version lives in two files; a mismatch ships a wrong version.
  # This gate fails the build if they drift apart.
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Version must match in pyproject.toml and searchts/__init__.py
        run: |
          python - <<'PY'
          import pathlib, re, sys
          def grab(path, pattern):
              text = pathlib.Path(path).read_text(encoding="utf-8")
              m = re.search(pattern, text, re.MULTILINE)
              return m.group(1) if m else None
          pyproject = grab("pyproject.toml", r'^version\s*=\s*"([^"]+)"')
          init = grab("searchts/__init__.py", r'^__version__\s*=\s*"([^"]+)"')
          print(f"pyproject.toml       = {pyproject}")
          print(f"searchts/__init__.py = {init}")
          if not pyproject or not init:
              sys.exit("could not find a version string in one of the files")
          if pyproject != init:
              sys.exit(f"version mismatch: {pyproject} != {init}")
          print("versions match")
          PY
